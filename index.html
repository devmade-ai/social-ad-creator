<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CanvaGrid</title>
    <meta name="description" content="CanvaGrid - Create social media ads for LinkedIn, Facebook, Instagram, Twitter/X, and TikTok" />

    <!-- PWA -->
    <!-- Two meta theme-color tags with media queries cover both OS preferences
         before JS loads. A single tag can't adapt. The useDarkMode hook
         dynamically updates both on manual toggle via querySelectorAll.
         Light = fantasy (#6d0076), Dark = luxury (#09090b). -->
    <meta name="theme-color" content="#6d0076" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CanvaGrid" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />

    <!-- Dark mode + theme flash prevention — apply .dark class + data-theme before first paint.
         The useDarkMode hook runs after React mounts, too late to prevent a flash.
         This inline classic (non-module) script reads localStorage and applies both
         .dark (Tailwind) and data-theme (DaisyUI) during HTML parse.
         Keys: 'darkMode', 'themeCombo'. Combos: mono (lofi/black), luxe (fantasy/luxury).
         First-visit default is light (no stored value → false). Brand-aligned with PWA icon. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('darkMode');
          var isDark = stored === 'true';
          var root = document.documentElement;
          if (isDark) root.classList.add('dark');
          // Combo-based theme resolution (with migration from old lightTheme/darkTheme keys)
          var combos = {"mono":{"light":"lofi","dark":"black"},"luxe":{"light":"fantasy","dark":"luxury"}};
          var comboId = localStorage.getItem('themeCombo') || 'luxe';
          var combo = combos[comboId] || combos.mono;
          var theme = isDark ? combo.dark : combo.light;
          root.setAttribute('data-theme', theme);
          var metaColors = {"lofi":"#ebebeb","black":"#000000","fantasy":"#6d0076","luxury":"#09090b"};
          var mc = metaColors[theme] || '#808080';
          document.querySelectorAll('meta[name="theme-color"]').forEach(function(m) { m.setAttribute('content', mc); });
        } catch(e) {}
      })();
    </script>

    <!-- Capture PWA install prompt before framework mounts.
         Requirement: beforeinstallprompt can fire before React hydrates on cached SW repeat visits.
         Approach: Inline non-module script stores the event on window for the React hook to pick up.
         Alternatives:
           - Listen only in React hook: Rejected - event lost if fired before mount. -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHF1F61E55"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NHF1F61E55');
      window._pageLoadTime = Date.now();
    </script>

    <!-- Fonts. crossorigin="anonymous" makes the stylesheet's cssRules
         JS-readable — see CLAUDE.md "Font embedding for export". -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <div id="debug-root"></div>

    <!-- Pre-React debug pill — captures errors before JS bundles load.
         Requirement: React pill can't catch bundle load failures or pre-mount crashes.
         Approach: Inline script with circular buffer, global error capture, 20s loading timeout.
         Bridges to React app via window.__debugPushError() global. -->
    <script>
      window.__debugErrors = [];
      window.__debugPushError = function(msg, stack) {
        window.__debugErrors.push({ msg: msg, stack: stack, time: Date.now() });
        if (window.__debugErrors.length > 200) window.__debugErrors.shift();
      };
      // Named handlers so debugLog.js can removeEventListener after takeover
      window.__debugPreErrorHandler = function(e) {
        var stack = (e.error && e.error.stack) || ((e.filename || '') + ':' + (e.lineno || 0));
        window.__debugPushError(e.message || 'Unknown error', stack);
      };
      window.__debugPreRejectionHandler = function(e) {
        window.__debugPushError('Unhandled rejection: ' + e.reason);
      };
      window.addEventListener('error', window.__debugPreErrorHandler);
      window.addEventListener('unhandledrejection', window.__debugPreRejectionHandler);
      window.__debugReactMounted = false;
      window.__debugClearLoadTimer = function() {
        window.__debugReactMounted = true;
        clearTimeout(window.__debugLoadTimer);
      };
      window.__debugLoadTimer = setTimeout(function() {
        if (!window.__debugReactMounted) {
          var root = document.getElementById('root');
          if (root) {
            var warning = document.createElement('p');
            warning.style.cssText = 'color:#eab308;font-size:14px;margin-top:12px;text-align:center;font-family:system-ui,sans-serif';
            warning.textContent = 'This is taking longer than usual. Check the debug pill for errors, or try reloading.';
            root.appendChild(warning);
          }
        }
      }, 20000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
