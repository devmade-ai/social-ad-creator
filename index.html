<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CanvaGrid</title>
    <meta name="description" content="CanvaGrid - Create social media ads for LinkedIn, Facebook, Instagram, Twitter/X, and TikTok" />

    <!-- PWA -->
    <!-- Two meta theme-color tags with media queries cover both OS preferences
         before JS loads. A single tag can't adapt. The useDarkMode hook
         dynamically updates both on manual toggle via querySelectorAll.
         Light = nord primary (#5E81AC), Dark = night base-100 (#0F172A). -->
    <meta name="theme-color" content="#5E81AC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CanvaGrid" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />

    <!-- Dark mode flash prevention — apply .dark class + data-theme before first paint.
         The useDarkMode hook runs after React mounts, too late to prevent a
         white flash for dark mode users. This inline classic (non-module) script
         reads localStorage and applies both .dark (Tailwind) and data-theme (DaisyUI)
         during HTML parse. Must duplicate the same localStorage key, matchMedia logic,
         and DaisyUI theme names ('nord'/'night') as the hook. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('darkMode');
          var isDark = stored !== null
            ? stored === 'true'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          if (isDark) root.classList.add('dark');
          root.setAttribute('data-theme', isDark ? 'night' : 'nord');
        } catch(e) {}
      })();
    </script>

    <!-- Capture PWA install prompt before framework mounts.
         Requirement: beforeinstallprompt can fire before React hydrates on cached SW repeat visits.
         Approach: Inline non-module script stores the event on window for the React hook to pick up.
         Alternatives:
           - Listen only in React hook: Rejected - event lost if fired before mount. -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHF1F61E55"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NHF1F61E55');
      window._pageLoadTime = Date.now();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
